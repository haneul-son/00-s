<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <div class="calculator" role="application" aria-label="계산기">
        <div class="display" aria-live="polite" aria-atomic="true">
          <div class="display__sub" id="subDisplay" hidden></div>
          <div class="display__main" id="mainDisplay">0</div>
        </div>
        <div class="keys" id="keypad">
          <button type="button" class="key key--wide key--muted" data-action="clear">AC</button>
          <button type="button" class="key key--muted" data-action="sign">±</button>
          <button type="button" class="key key--muted" data-action="percent">%</button>
          <button type="button" class="key key--accent" data-action="operator" data-value="/">÷</button>

          <button type="button" class="key" data-action="digit" data-value="7">7</button>
          <button type="button" class="key" data-action="digit" data-value="8">8</button>
          <button type="button" class="key" data-action="digit" data-value="9">9</button>
          <button type="button" class="key key--accent" data-action="operator" data-value="*">×</button>

          <button type="button" class="key" data-action="digit" data-value="4">4</button>
          <button type="button" class="key" data-action="digit" data-value="5">5</button>
          <button type="button" class="key" data-action="digit" data-value="6">6</button>
          <button type="button" class="key key--accent" data-action="operator" data-value="-">−</button>

          <button type="button" class="key" data-action="digit" data-value="1">1</button>
          <button type="button" class="key" data-action="digit" data-value="2">2</button>
          <button type="button" class="key" data-action="digit" data-value="3">3</button>
          <button type="button" class="key key--accent" data-action="operator" data-value="+">+</button>

          <button type="button" class="key key--wide" data-action="digit" data-value="0">0</button>
          <button type="button" class="key" data-action="decimal">.</button>
          <button type="button" class="key key--accent key--equals" data-action="equals">=</button>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
